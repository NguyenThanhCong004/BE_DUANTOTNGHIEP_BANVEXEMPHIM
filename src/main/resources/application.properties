# --- Swagger / OpenAPI (springdoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.fpoly.duan.controller
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.syntaxHighlight.theme=agate
springdoc.swagger-ui.default-models-expand-depth=-1
springdoc.swagger-ui.default-model-expand-depth=2
springdoc.swagger-ui.display-operation-id=false
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.customCssUrl=/swagger-ui/custom.css
springdoc.show-actuator=false
springdoc.writer-with-default-pretty-printer=true
